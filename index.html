<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF8F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>幸福感知器</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <button id="prevMonth" class="nav-btn" aria-label="上一个">‹</button>
    <h1 id="monthTitle" class="month-title">2026 年 6 月</h1>
    <button id="nextMonth" class="nav-btn" aria-label="下一个">›</button>
  </header>

  <!-- 视图切换 -->
  <div class="view-toggle">
    <button class="vt-btn active" data-view="week">周视图</button>
    <button class="vt-btn" data-view="month">月视图</button>
  </div>

  <!-- 星期表头 -->
  <div class="weekdays">
    <span>一</span><span>二</span><span>三</span><span>四</span>
    <span>五</span><span>六</span><span class="sun">日</span>
  </div>

  <!-- 日历网格：物理图标画在这上面的 canvas -->
  <main class="calendar-wrap">
    <div id="calendar" class="calendar"></div>
    <canvas id="physicsCanvas" class="physics-canvas"></canvas>
  </main>

  <!-- 记录幸福事件的弹层 -->
  <div id="sheet" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2 id="sheetDate">记录幸福</h2>
        <button class="sheet-close" data-close aria-label="关闭">×</button>
      </div>
      <!-- 第一层：五大类 -->
      <div id="catList" class="cat-list"></div>
      <!-- 第二层：子类 -->
      <div id="subList" class="sub-list hidden"></div>
      <!-- 第三层：默认标签 -->
      <div id="tagList" class="tag-list hidden"></div>
      <!-- 今日已记录 -->
      <div id="todayEvents" class="today-events"></div>
    </div>
  </div>

  <script src="categories.js"></script>
  <script src="physics.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
